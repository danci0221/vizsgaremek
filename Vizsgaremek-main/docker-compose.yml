services:

  frontend:
    container_name: mozi_frontend
    build:
      context: ./Frontend     
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "8090:80"             
    restart: unless-stopped

  db:
    image: mysql:8.4
    container_name: mozi_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: mozipont_beta   
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppw
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db_init:/docker-entrypoint-initdb.d:ro 
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpw"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: mozi_phpmyadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8082:80"             

  api:
    build:
      context: ./backend      
      dockerfile: Dockerfile
    container_name: mozi_api
    restart: unless-stopped
    shm_size: '1gb'           
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: rootpw
      DB_NAME: mozipont_beta
      PORT: 5000
    ports:
      - "5000:5000"

volumes:
  db_data: